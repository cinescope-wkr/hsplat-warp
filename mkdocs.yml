site_name: hsplat-warp
site_description: Warp-extended primitive-based computer-generated holography research library
site_url: https://cinescope-wkr.github.io/hsplat-warp/
repo_url: https://github.com/cinescope-wkr/hsplat
repo_name: cinescope-wkr/hsplat
docs_dir: docs
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture:
      - Overview: architecture/index.md
      - Pipeline: architecture/pipeline.md
      - Native and Warp Backends: architecture/backends.md
  - Research:
      - Why hsplat-warp: research/why-hsplat-warp.md
      - Experiments and Scripts: research/experiments.md
plugins:
  - search
markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - tables
